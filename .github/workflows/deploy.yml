name: deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-x402
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "owner=${owner_lc}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # GHCR rejects uppercase repo paths, so the image lives under the
          # lowercased owner regardless of how the repo is spelled.
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/x402-aegent-dev:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/x402-aegent-dev:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger remote redeploy
        # The authorized_keys entry on the server pins this key to a single
        # script (`/srv/x402/deploy.sh`) via `command=` and `restrict`, so
        # whatever we send here is ignored — the server runs the pinned
        # command. Sending `deploy` as a sentinel keeps the intent visible
        # in CI logs.
        run: ssh -o BatchMode=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" deploy
